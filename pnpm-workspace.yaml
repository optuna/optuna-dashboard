packages:
  - "optuna_dashboard"
  - "standalone_app"
  - "vscode"
  - "tslib/types"
  - "tslib/storage"
  - "tslib/react"

minimumReleaseAge: 1440
trustPolicy: "no-downgrade"
trustPolicyIgnoreAfter: 525600
strictDepBuilds: true
blockExoticSubdeps: true
verifyDepsBeforeRun: error
allowBuilds:
  "@biomejs/biome": true
  "@playwright/browser-chromium": true
  "@swc/core": true
  esbuild: true

catalog:
  "@emotion/react": "^11.11.4"
  "@emotion/styled": "^11.11.5"
  "@mui/icons-material": "^6.5.0"
  "@mui/material": "^6.5.0"
  "@mui/system": "^6.5.0"
  "@types/plotly.js": "^2.12.32"
  "@types/react": "^19.2.15"
  "@types/react-dom": "^19.2.3"
  "plotly.js-dist-min": "^2.33.0"
  "react": "^19.2.6"
  "react-dom": "^19.2.6"
  "typescript": "^6.0.3"
