name: tests
on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/jupyterlab-tests.yml'
      - '**.py'
      - '**.ts'
      - '**.tsx'
      - 'optuna_dashboard/package.json'
      - 'tslib/react/package.json'
      - 'tslib/storage/package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'jupyterlab/pyproject.toml'
      - 'jupyterlab/package.json'
      - 'jupyterlab/yarn.lock'
      - 'jupyterlab/tsconfig.json'
jobs:
  test-build:
    name: Test build for JupyterLab extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        working-directory: jupyterlab
        run: |
          uv venv
          uv pip install --exclude-newer="2 days" --upgrade pip setuptools build
          uv pip install --exclude-newer="2 days" jupyterlab
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Prime JupyterLab's Yarn environment before the extension build.
      - name: Install JupyterLab frontend dependencies
        working-directory: jupyterlab
        run: uv run jlpm install --immutable
      
      - run: make jupyterlab-extension
