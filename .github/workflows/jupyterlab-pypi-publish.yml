name: Build JupyterLab extension distribution and publish to PyPI

on:
  release:
    types:
      - published

jobs:
  pypi:
    name: Build and publish JupyterLab extension distribution to PyPI
    if: ${{ startsWith(github.event.release.tag_name, 'jupyterlab-v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: '24'
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        python-version: '3.13'
    - name: Install dependencies
      working-directory: jupyterlab
      run: |
        uv venv
        uv pip install wheel twine build setuptools jupyterlab

    - name: Check release tag version
      env:
        TAG_NAME: ${{ github.event.release.tag_name }}
      run: |
        tag_version="${TAG_NAME#jupyterlab-v}"
        package_version="$(node -p "require('./jupyterlab/package.json').version")"
        if [ "${tag_version}" != "${package_version}" ]; then
          echo "Release tag version ${tag_version} does not match jupyterlab/package.json version ${package_version}."
          exit 1
        fi

    - run: make jupyterlab-extension
    - name: Check distribution
      working-directory: jupyterlab
      run: uv run --no-sync twine check dist/*.whl

    - name: Publish JupyterLab extension distribution to PyPI
      uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
      with:
        packages-dir: jupyterlab/dist/
        attestations: false

